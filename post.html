<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Blog2Day - Premium Web Development, Synthetic Indices Trading Analysis (V75), and Digital Insights. Professional solutions for modern brands."
    />
    <meta
      name="keywords"
      content="Web Development, Synthetic Indices, Volatility 75, Price Action, Smart Money Concepts, Lagos Developer"
    />
    <meta name="author" content="Your Name / Blog2Day" />

    <meta
      property="og:title"
      content="Blog2Day | Bespoke Web Development & Trading Insights"
    />
    <meta
      property="og:description"
      content="Mastering web development and market strategies. Learn how to scale your brand."
    />
    <meta property="og:type" content="website" />
    <title>Post Detail | My Blog</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="single-post-body">
    <div id="header-placeholder"></div>

    <main class="container post-container">
      <header class="post-header">
        <div id="postMeta" class="post-meta-label"></div>
        <h1 id="postTitle">Loading post...</h1>
        <div id="postHeroImage" class="post-main-image-container"></div>
      </header>

      <article class="post-main-content">
        <div id="contentPartOne"></div>

        <div
          class="mid-post-suggestion"
          id="midSuggestionBox"
          style="display: none"
        >
          <span>Recommended:</span>
          <div id="midSuggestionLink"></div>
        </div>

        <div id="contentPartTwo"></div>
      </article>

      <hr class="section-divider" />

      <section class="related-posts">
        <h2>You Might Also Like</h2>
        <div class="popular-grid" id="bottomSuggestions"></div>
      </section>

      <section class="comment-section">
        <h3>Leave a Comment</h3>
        <form id="commentForm" class="comment-form">
          <input
            type="text"
            id="commentName"
            placeholder="Your Name"
            required
          />
          <textarea
            id="commentText"
            placeholder="What are your thoughts?"
            required
          ></textarea>
          <button type="submit" class="btn-hero">Post Comment</button>
        </form>

        <div class="comments-display">
          <h3>Comments (<span id="commentCount">0</span>)</h3>
          <div id="commentList"></div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
  </body>
</html>
